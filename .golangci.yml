# Don't remove below line, it controls the version of golangci-linter at runtime.
run:
  tests: false
  skip-dirs:
    - scripts
output:
  sort-results: true
linters:
  enable-all: false
  enable:
    - deadcode
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - varcheck
    - gosec
    - gofumpt
    - nosnakecase
    - goconst
  presets:
    - bugs
    - comment
    - complexity
    - error
    - metalinter
    - module
    - performance
    - sql
    - unused
issues:
  fix: true
