# Don't remove below line, it controls the version of golangci-linter at runtime.
# version: v1.49.0
run:
  tests: false
  skip-dirs:
    - scripts
output:
  sort-results: true
linters:
  enable-all: false
  enable:
    - deadcode
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
#    - typecheck
    - unused
    - varcheck
    - gosec
    - gofumpt
    - nosnakecase
    - goconst
issues:
  fix: true
