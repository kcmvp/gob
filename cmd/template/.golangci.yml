# Don't remove below `# version:` line, it controls the version of golangci-linter at runtime.
# version: {{.}}
run:
  tests: false
  skip-dirs:
    - scripts
output:
  sort-results: true
linters:
  enable-all: false
  enable:
    - deadcode
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
#    - typecheck
    - unused
    - varcheck
    - gosec
#    - gofumpt
    - nosnakecase
    - goconst
  presets:
    - bugs
    - comment
    - complexity
    - error
    - format
    - import
    - metalinter
    - module
    - performance
    - sql
    #    - style
    #    - test
    - unused
issues:
  fix: true
